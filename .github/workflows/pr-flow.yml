name: 'PR Checks'
on:
  pull_request:
    branches:
      - master
      - hotfix-*
      - release-*
env:
  NODE_VERSION: 20.19.6
  MASTER_BRANCH: 'master'

jobs:
  package:
    name: PR Build
    runs-on: sre-aws-build
    steps:
      - name: Clean the workspace
        uses: docker://alpine:3
        with:
          args: /bin/sh -c "rm -rf /github/workspace/.* || rm -rf /github/workspace/*"

      - name: Check out code
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.SRE_GITHUB_BOT_TOKEN }}
          fetch-depth: '0'

      - name: Checkout
        uses: actions/checkout@v2
        with:
          repository: 'angel-one/sre-npm-action'
          ref: 9
          token: ${{ secrets.SRE_GIT_READ_TOKEN }}
          path: temp

      - name: Copy custom action
        shell: bash
        run: |
          cp temp/pr-flow/action.yml ./.github/workflows/

      - name: Run the npm build
        uses: ./.github/workflows
        id: build
        with:
          ARTIFACT_ID: dpdp-sdk
          GITHUB_TOKEN: ${{ secrets.SRE_GITHUB_BOT_TOKEN }}
          SRE_NEXUS_SECRET_KEY: ${{ secrets.NEXUSPROD_SECRET_KEY }}
          HOTFIX_BRANCH_PATTERN: 'release-*.*.*'
